# Notification Center — single rendering source for active alerts.
#
# Requires the `config-template-card` custom card (already installed in the
# mobile HA setup). Every surface (Lovelace, wall panels) includes THIS file
# and iterates the same JSON attribute, so colors/paths/order live in one place.
#
#   include this once per view:
#     - !include dashboards/modules/notification-list.yaml
#
# Source of truth: sensor.notification_center -> attributes.alerts[]
#   each alert: tag, name, title, message, priority, icon, color,
#               channels, navigation_target, created_at, acknowledged, age_min

type: custom:config-template-card
entities:
  - sensor.notification_center
variables:
  alerts: "states['sensor.notification_center']?.attributes?.alerts || []"
card:
  type: markdown
  content: >-
    ${ alerts.length === 0
      ? 'No active notifications.'
      : alerts.map(a => `<ha-alert alert-type="${
          a.priority === 'critical' ? 'error'
          : a.priority === 'warning' ? 'warning'
          : a.priority === 'digest' ? 'info'
          : 'info'
        }" title="${a.title}${a.age_min ? ' · ' + a.age_min + 'm ago' : ''}">${a.message}</ha-alert>`).join('\n') }

