# Notification Center — rendering sources for active alerts.
#
# PREFERRED (Deliverable 2): the custom card auto-loaded by the integration
# (custom_components/notification_center/panel/notification-center-card.js).
# It shows up in the card picker automatically — no resource registration:
#     - type: custom:notification-center-card            # bell chip -> pop-up
#     - type: custom:notification-center-card            # always-expanded list
#       mode: inline
#
# The simple markdown fallback below needs only `config-template-card` and works
# without the custom card (read-only; no dismiss/snooze).
#
# Source of truth: sensor.notification_center -> attributes.alerts[]
#   each alert: tag, name, title, message, priority, icon, color, channels,
#               navigation_target, created_at, age_min, actions, digest, items

type: custom:config-template-card
entities:
  - sensor.notification_center
variables:
  alerts: "states['sensor.notification_center']?.attributes?.alerts || []"
card:
  type: markdown
  content: >-
    ${ alerts.length === 0
      ? 'No active notifications.'
      : alerts.map(a => `<ha-alert alert-type="${
          a.priority === 'critical' ? 'error'
          : a.priority === 'warning' ? 'warning'
          : a.priority === 'digest' ? 'info'
          : 'info'
        }" title="${a.title}${a.age_min ? ' · ' + a.age_min + 'm ago' : ''}">${a.message}</ha-alert>`).join('\n') }

