# Pre-loaded notification rules, migrated from the bubble-card notifications file.
#
# Import them into the integration with:
#     service: notification_center.import_rules
# (optionally `replace_existing: true` to wipe & reimport).
#
# Mapping applied:
#   - colors -> priority: #EA4D3D=critical, #EF8C00=warning,
#     #F6CE46=warning(Garage)/info(rest), #4ebcff=info; batteries=digest.
#   - channels (priority matrix): critical=mobile+bell+wall+tts+navigate,
#     warning=mobile+bell+wall, info=bell+wall, digest=mobile+bell+wall.
#   - 2-condition cards -> source_type: template (tracks both entities).
#   - 29 battery sensors collapsed into ONE digest rule (digest_group: batteries).
#   - navigate tap_actions -> navigation_target; more-info/script actions dropped.

# ===== CRITICAL =============================================================
- name: Power Outage
  dedup_tag: power_outage
  source_type: state
  entity_id: binary_sensor.bayberry_grid_status
  operator: "=="
  value: "off"
  priority: critical
  channels: [mobile, bell, wall, tts, navigate]
  icon: mdi:flash-alert
  color: "#EA4D3D"
  navigation_target: /mobile-dash/energy
  quiet_hours_behavior: ignore
  presence_routing: all
  escalation_after: 5

- name: Powerwall Charge Low
  dedup_tag: powerwall_charge_low
  source_type: template
  condition_template: >-
    {{ is_state('binary_sensor.bayberry_grid_status', 'off')
       and states('sensor.bayberry_charge') | float(100) < 25 }}
  priority: critical
  channels: [mobile, bell, wall, tts]
  icon: mdi:battery-alert
  color: "#EA4D3D"
  quiet_hours_behavior: ignore
  presence_routing: all
  escalation_after: 5

- name: Alarm Triggered
  dedup_tag: alarm_triggered
  source_type: state
  entity_id: alarm_control_panel.bayberry_alarm_v2
  operator: "=="
  value: triggered
  priority: critical
  channels: [mobile, bell, wall, tts, navigate]
  icon: mdi:shield-alert
  color: "#EA4D3D"
  navigation_target: /mobile-dash/security
  quiet_hours_behavior: ignore
  presence_routing: all
  escalation_after: 5

# ===== WARNING ==============================================================
- name: Active Weather Alert
  dedup_tag: nws_weather_alert
  source_type: numeric
  entity_id: sensor.nws_alerts_alerts
  operator: ">"
  value: 0
  priority: warning
  channels: [mobile, bell, wall]
  icon: mdi:weather-hurricane
  color: "#EF8C00"
  navigation_target: /mobile-dash/weather
  quiet_hours_behavior: downgrade
  presence_routing: away_only
  # Pull the alert type/headline from NWS into the message. Adjust the attribute
  # to match your integration (nws_alerts commonly exposes 'event'/'title'/'spoken_desc').
  message_template: >-
    {{ state_attr('sensor.nws_alerts_alerts', 'event')
       or state_attr('sensor.nws_alerts_alerts', 'title')
       or state_attr('sensor.nws_alerts_alerts', 'spoken_desc')
       or 'Active weather alert in your area.' }}

