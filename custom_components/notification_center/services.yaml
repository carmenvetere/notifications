send:
  name: Send notification
  description: Create a one-off notification, routed by priority and channels.
  fields:
    tag:
      name: Tag
      description: Dedup tag. Reusing a tag replaces the existing alert.
      example: garage_open
      selector:
        text:
    title:
      name: Title
      description: Notification title.
      required: true
      example: Garage door open
      selector:
        text:
    message:
      name: Message
      description: Notification body.
      example: The garage has been open for 10 minutes.
      selector:
        text:
    priority:
      name: Priority
      default: info
      selector:
        select:
          options: [critical, warning, info]
    channels:
      name: Channels
      description: Where to deliver the notification.
      selector:
        select:
          multiple: true
          options: [mobile, bell, wall, tts, navigate]
    icon:
      name: Icon
      selector:
        icon:
    color:
      name: Color
      example: "#EA4D3D"
      selector:
        text:
    navigation_target:
      name: Navigation target
      description: URL/dashboard path used for force-navigate.
      selector:
        text:
    tts_targets:
      name: TTS targets
      selector:
        entity:
          domain: media_player
          multiple: true
    tts_message:
      name: Spoken announcement
      description: Spoken text for the TTS channel. Defaults to the message.
      selector:
        text:
    digest_group:
      name: Digest group
      selector:
        text:

dismiss:
  name: Dismiss
  description: Remove an active alert and clear its bell notification.
  fields:
    tag:
      name: Tag
      required: true
      selector:
        text:

dismiss_item:
  name: Dismiss digest item
  description: Hide a single item within a digest alert (by its name/key).
  fields:
    tag:
      name: Tag
      required: true
      selector:
        text:
    item:
      name: Item key
      description: The item's name (or key).
      required: true
      selector:
        text:

snooze:
  name: Snooze
  description: Dismiss an alert and suppress it for a number of minutes.
  fields:
    tag:
      name: Tag
      required: true
      selector:
        text:
    minutes:
      name: Minutes
      required: true
      selector:
        number:
          min: 1
          max: 1440
          unit_of_measurement: min
          mode: box

run_action:
  name: Run custom action
  description: >-
    Run one of an alert's rule-defined custom actions (e.g. "I replaced it" → a
    reset script), then clear the alert. Usually invoked from the card button.
  fields:
    tag:
      name: Tag
      required: true
      selector:
        text:
    action:
      name: Action id
      description: >-
        The custom action's stable id (older rules may use its zero-based
        index). Usually invoked from the card button, not by hand.
      required: true
      selector:
        text:

reload:
  name: Reload
  description: Rebuild rules and listeners without restarting Home Assistant.

test_push:
  name: Test app notification
  description: >-
    Send a test push to every configured mobile notify target right now
    (bypassing rules, quiet hours and cooldown). If none are configured, a
    repair issue is raised. Use this to verify your app notifications work.

export_rules:
  name: Export rules
  description: >-
    Return every configured rule as data plus a ready-to-save YAML string —
    use it to back rules up, or to seed a `notification_center: rules:` file
    when switching to YAML-managed (git-tracked) rules. Run from Developer
    Tools → Actions and copy the `yaml` field of the response.

import_rules:
  name: Import rules
  description: >-
    Bulk-create rule subentries. With no `rules`, imports the packaged
    example_rules.yaml (illustrative starter rules). Idempotent: rules whose
    dedup_tag already exists are skipped.
  fields:
    rules:
      name: Rules
      description: Optional inline list of rule definitions. Omit to use the packaged file.
      selector:
        object:
    replace_existing:
      name: Replace existing
      description: Remove all current rules before importing.
      default: false
      selector:
        boolean:
