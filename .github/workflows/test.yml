name: Tests

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  hassfest:
    name: hassfest (manifest/structure)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS validation
    runs-on: ubuntu-latest
    # Non-blocking for now: the action also checks the GitHub repo description
    # and topics (set those in repo settings — #33) and brands (#21). Runs
    # informationally until those land, then drop continue-on-error to enforce.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration
          ignore: brands

  pytest:
    name: pytest (unit + HA integration)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_test.txt
      - name: Run tests
        run: python -m pytest -q
