name: Release

# Cut a GitHub Release (which HACS reads as a version) for a semver tag.
# A tag containing a hyphen (e.g. v0.2.0-beta.1) is published as a pre-release,
# which HACS surfaces only when "Show beta versions" is enabled.
#
# Two ways to trigger:
#   1. Push a tag:  git tag v0.1.0 && git push origin v0.1.0
#   2. Manually:    Actions -> Release -> Run workflow -> enter the tag.
#      (Use this when your environment can't push tags; the workflow creates
#      the tag at the selected branch's HEAD.)
#
# Always bump "version" in custom_components/notification_center/manifest.json
# to match the tag first.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true
        default: "v0.1.0"

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify manifest version matches the tag
        run: |
          MANIFEST_VERSION=$(python3 -c "import json;print(json.load(open('custom_components/notification_center/manifest.json'))['version'])")
          TAG_VERSION="${{ steps.tag.outputs.name }}"
          TAG_VERSION="${TAG_VERSION#v}"
          echo "manifest=$MANIFEST_VERSION tag=$TAG_VERSION"
          if [ "$MANIFEST_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::manifest.json version ($MANIFEST_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          prerelease: ${{ contains(steps.tag.outputs.name, '-') }}
