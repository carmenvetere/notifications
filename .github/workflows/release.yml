name: Release

# Cut a GitHub Release (which HACS reads as a version) whenever a semver tag is
# pushed. A tag containing a hyphen (e.g. v0.2.0-beta.1) is published as a
# pre-release, which HACS surfaces only when "Show beta versions" is enabled.
#
# Usage:
#   1. Bump "version" in custom_components/notification_center/manifest.json.
#   2. Commit, then tag: git tag v0.1.0 && git push origin v0.1.0
#      (beta: git tag v0.2.0-beta.1 && git push origin v0.2.0-beta.1)

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify manifest version matches the tag
        run: |
          MANIFEST_VERSION=$(python3 -c "import json;print(json.load(open('custom_components/notification_center/manifest.json'))['version'])")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "manifest=$MANIFEST_VERSION tag=$TAG_VERSION"
          if [ "$MANIFEST_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::manifest.json version ($MANIFEST_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
